# .github/workflows/ci.yml — Standard CI Pipeline for AI-Assisted Development
# Replace [ECOSYSTEM_COMMANDS] placeholders with commands from data/ecosystems.json
name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

