# .importlinter — Python architectural boundary enforcement
# Install: pip install import-linter
# Run: lint-imports
# CI: Add `lint-imports` to your CI lint step
#
# Dependency direction: models -> repositories -> services -> api -> cli
# Each layer may only import from layers to its left.

[importlinter]
root_package = src

[importlinter:contract:layer-order]
name = Architectural layer dependency direction
type = layers
layers =
    cli
    api
    services
    repositories
    models

[importlinter:contract:no-api-in-models]
name = Models must not import from API layer
type = forbidden
source_modules =
    src.models
forbidden_modules =
    src.api
    src.cli

[importlinter:contract:no-service-in-repo]
name = Repositories must not import from services
type = forbidden
source_modules =
    src.repositories
forbidden_modules =
    src.services
    src.api
    src.cli

# REMEDIATION (shown to agents via error output):
# "Contract 'Architectural layer dependency direction' was broken.
#  src.api imports src.cli — but api is below cli in the layer order.
#  Move shared logic to a lower layer (e.g., src.services or src.models)."
