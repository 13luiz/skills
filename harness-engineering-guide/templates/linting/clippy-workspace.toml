# clippy.toml — Rust workspace-level clippy configuration
# Place at the workspace root for consistent enforcement across all crates.
#
# Run: cargo clippy -- -D warnings
# CI: cargo clippy -- -D warnings (fails on any warning)
#
# BOUNDARY ENFORCEMENT NOTE:
# Unlike other ecosystems that need external tools (ESLint/depguard/ArchUnit) to enforce
# dependency direction, Rust's Cargo workspace provides BUILT-IN boundary enforcement:
# - Each crate must explicitly declare dependencies in its Cargo.toml
# - A crate cannot import from another crate without declaring it as a dependency
# - `[workspace.dependencies]` centralizes version management across crates
# This means the Cargo dependency graph IS your architecture boundary. To enforce that
# crate A must not depend on crate B, simply don't add B to A's [dependencies].
# Use `cargo tree` to visualize and audit the dependency graph.

# Enforce explicit error handling
disallowed-methods = [
    { path = "std::result::Result::unwrap", reason = "Use `?` operator or explicit error handling instead of unwrap(). See docs/ARCHITECTURE.md for error patterns." },
    { path = "std::result::Result::expect", reason = "Use `?` operator with context via anyhow/thiserror. See docs/ARCHITECTURE.md." },
    { path = "std::option::Option::unwrap", reason = "Use `if let`, `match`, or `unwrap_or_default()` instead." },
]

# Complexity thresholds
cognitive-complexity-threshold = 25
too-many-arguments-threshold = 7
too-many-lines-threshold = 100
type-complexity-threshold = 250

# ── Workspace-wide lint configuration (Rust 1.74+) ──
# Add the following to your root Cargo.toml for unified enforcement.
# Each crate inherits these lints via `[lints] workspace = true` in its own Cargo.toml.
#
# [workspace.lints.clippy]
# pedantic = "warn"
# unwrap_used = "deny"
# expect_used = "deny"
# panic = "deny"
# todo = "warn"
# unreachable_pub = "warn"
#
# [workspace.lints.rust]
# unsafe_code = "deny"
# missing_docs = "warn"
#
# Then in each crate's Cargo.toml:
# [lints]
# workspace = true
